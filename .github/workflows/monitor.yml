name: Tesla FSD Monitor

on:
  schedule:
    - cron: '0 */2 * * *'      # Runs every 2 hours
  workflow_dispatch:           # Allows manual run from Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: "amargaritan@gmail.com"     # ← Your email (hard-coded for reliability)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 geopy

      - name: Run monitoring script
        run: python tesla_fsd_monitor.py

      - name: Commit updated seen_listings.json
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add seen_listings.json || true
          if git diff --staged --quiet; then
            echo "No changes to seen_listings.json"
          else
            git commit -m "Update seen listings [skip ci]"
            git push || echo "Push skipped"
          fi
